<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="3600" height="1600" viewBox="0 0 3600 1600">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <style>
    text { font-family: Helvetica, Arial, sans-serif; fill: #24313a; }
    .title { font-size: 38px; font-weight: 700; }
    .subtitle { font-size: 20px; fill: #6f7c82; }
    .label { font-size: 20px; font-weight: 700; }
    .small { font-size: 16px; fill: #6f7c82; }
  </style>
  <rect x="0" y="0" width="3600" height="1600" fill="#f5efe4"/>

  <text x="160" y="120" class="title">Side-Bay and Workbench View Sheet</text>
  <text x="160" y="156" class="subtitle">Two centre-of-shed wall views: left tile dock on the left, and the right workbench / tool wall on the right.</text>

  <rect x="140" y="250" width="1620" height="1160" rx="24" fill="#fffaf1" filter="url(#shadow)"/>
  <rect x="1840" y="250" width="1620" height="1160" rx="24" fill="#fffaf1" filter="url(#shadow)"/>

  <g transform="translate(220 320)">
    <text x="0" y="0" class="label">From the centre looking toward the left wall</text>
    <polygon points="120,960 1260,960 1080,780 300,780" fill="#efe7d8" stroke="#cfc2ac" stroke-width="3"/>
    <rect x="260" y="220" width="900" height="560" fill="#fcf8f0" stroke="#24313a" stroke-width="4"/>
    <rect x="260" y="470" width="900" height="42" fill="#6a8f92"/>
    <rect x="260" y="512" width="900" height="188" fill="#bed8d8" stroke="#24313a" stroke-width="2"/>
    <rect x="320" y="700" width="780" height="120" fill="#c4dad9" stroke="#24313a" stroke-width="2"/>
    <rect x="320" y="820" width="780" height="36" fill="#e2ebef" stroke="#24313a" stroke-width="2"/>
    <line x1="1210" y1="330" x2="1430" y2="330" stroke="#41696a" stroke-width="5"/>
    <rect x="1270" y="360" width="68" height="460" fill="#e8eef0" stroke="#24313a" stroke-width="2"/>
    <rect x="1365" y="440" width="42" height="380" fill="#e8eef0" stroke="#24313a" stroke-width="2"/>

    <text x="380" y="452" class="small">upper shelf at 145 cm</text>
    <text x="380" y="628" class="small">deep staging top</text>
    <text x="380" y="850" class="small">tiles stored low on the deck</text>
    <text x="1242" y="306" class="small">shallow front clip rail</text>
    <text x="1220" y="900" class="small">folding ladder + long tools</text>
  </g>

  <g transform="translate(1920 320)">
    <text x="0" y="0" class="label">From the centre looking toward the right wall</text>
    <polygon points="120,960 1260,960 1080,780 300,780" fill="#efe7d8" stroke="#cfc2ac" stroke-width="3"/>
    <rect x="260" y="220" width="900" height="560" fill="#fcf8f0" stroke="#24313a" stroke-width="4"/>
    <rect x="260" y="380" width="900" height="32" fill="#915532"/>
    <rect x="260" y="412" width="900" height="176" fill="#f3ece2" stroke="#24313a" stroke-width="2"/>
    <line x1="330" y1="455" x2="1080" y2="455" stroke="#41696a" stroke-width="4"/>
    <line x1="360" y1="505" x2="1020" y2="505" stroke="#41696a" stroke-width="4"/>
    <circle cx="390" cy="535" r="10" fill="#41696a"/>
    <circle cx="470" cy="535" r="10" fill="#41696a"/>
    <circle cx="550" cy="535" r="10" fill="#41696a"/>
    <rect x="260" y="620" width="900" height="44" fill="#915532"/>
    <rect x="260" y="664" width="900" height="184" fill="#e4c4aa" stroke="#24313a" stroke-width="2"/>
    <rect x="330" y="700" width="280" height="120" fill="#d8e5ea" stroke="#24313a" stroke-width="2"/>
    <rect x="675" y="710" width="260" height="110" fill="#e9d7c8" stroke="#24313a" stroke-width="2"/>
    <line x1="1210" y1="410" x2="1430" y2="410" stroke="#41696a" stroke-width="5"/>
    <line x1="1250" y1="470" x2="1400" y2="470" stroke="#41696a" stroke-width="4"/>
    <rect x="1235" y="700" width="170" height="140" rx="18" fill="#d9d0c2" stroke="#7c6756" stroke-width="3"/>

    <text x="360" y="360" class="small">tool shelf + hanging board</text>
    <text x="332" y="805" class="small">Kärcher</text>
    <text x="720" y="805" class="small">toolbox</text>
    <text x="1220" y="390" class="small">front cutter rail</text>
    <text x="1220" y="885" class="small">BBQ pocket</text>
  </g>

  <g transform="translate(180 1480)">
    <text x="0" y="0" class="small">These two wall views are intentionally schematic and keep every difficult item visible: tiles, ladders, cutters, Kärcher, toolbox, and BBQ.</text>
  </g>
</svg>
