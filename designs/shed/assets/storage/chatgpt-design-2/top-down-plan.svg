    <text x="2230" y="800" class="small">42 cm back-wall shelving spine</text>
    <rect x="2176" y="826" width="34" height="24" rx="0" fill="#e2bca1" stroke="#8b5435" stroke-width="2" />
    <text x="2230" y="844" class="small">120 x 60 cm rear-left tile dock</text>
    <rect x="2176" y="870" width="34" height="24" rx="0" fill="#cfe6e1" stroke="#3f6b68" stroke-width="2" />
    <text x="2230" y="888" class="small">115 x 42 cm rear-right workbench</text>
    <rect x="2176" y="914" width="34" height="24" rx="0" fill="#edf4ee" stroke="#6a7f68" stroke-width="2" />
    <text x="2230" y="932" class="small">Open bulky-item pocket / light front-side zone</text>
    <text x="2176" y="980" class="small">All labels and dimensions are held well inside the safe area for robust PNG export.</text>
