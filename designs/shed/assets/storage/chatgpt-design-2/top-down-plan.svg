    <line x1="1600" y1="980" x2="1600" y2="1016" stroke="#c8b99f" stroke-width="2" />
    <text x="1110" y="990" class="dim" text-anchor="middle">196 cm rear clear width</text>
    <line x1="1380" y1="470" x2="1380" y2="1135" stroke="#60707a" stroke-width="3" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <line x1="1362" y1="470" x2="1398" y2="470" stroke="#c8b99f" stroke-width="2" />
