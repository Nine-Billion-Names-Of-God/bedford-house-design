    <rect x="2140" y="272" width="1010" height="352" rx="18" fill="#fff9ef" stroke="#d0c2aa" stroke-width="2" filter="url(#shadow)"/>
    <text x="2174" y="318" class="label">Storage logic</text>
    <text x="2174" y="364" class="small">1. The full back wall handles the repeatable box storage.</text>
    <text x="2174" y="402" class="small">2. The left dock is the only true 60 cm deep bay and matches the tile size exactly.</text>
    <text x="2174" y="440" class="small">3. The right wall stays active: bench, tool board, Kärcher, toolbox, cutter rail.</text>
    <text x="2174" y="478" class="small">4. Front-side zones stay shallow or open so the windows still read as windows.</text>
    <text x="2174" y="538" class="label">Bulky items shown honestly</text>
    <text x="2174" y="576" class="small">Tiles on the left dock, 2.0 m ladder overhead at the back, folded ladder front-left, BBQ front-right.</text>
    <rect x="2140" y="694" width="900" height="324" rx="18" fill="#fff9ef" stroke="#d0c2aa" stroke-width="2" filter="url(#shadow)"/>
    <text x="2174" y="742" class="label">Legend</text>
