    <rect x="1652" y="1118" width="240" height="62" rx="12" fill="#d6d0c6" stroke="#7d7366" stroke-width="2" />
    <text x="1678" y="1160" class="small">fertiliser / paint trays</text>
    <line x1="558" y1="468" x2="1770" y2="468" stroke="#d96355" stroke-width="10" />
    <text x="1134" y="434" class="label" text-anchor="middle">2.0 m ladder rack</text>
    <text x="1134" y="400" class="small" text-anchor="middle">placed high on the only wall long enough for secure horizontal storage</text>
    <text x="258" y="482" class="dim">190 cm edge height</text>
    <text x="1134" y="192" class="dim" text-anchor="middle">217.9 cm centre height</text>
    <text x="2022" y="482" class="dim" text-anchor="end">190 cm edge height</text>
