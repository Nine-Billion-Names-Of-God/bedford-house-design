    <line x1="2112" y1="200" x2="2148" y2="200" stroke="#c8b99f" stroke-width="2" />
    <line x1="2112" y1="1220" x2="2148" y2="1220" stroke="#c8b99f" stroke-width="2" />
    <text x="2144" y="710" class="dim">217.9 cm at centre</text>
    <rect x="2240" y="286" width="916" height="414" rx="18" fill="#fff9ef" stroke="#d0c2aa" stroke-width="2" filter="url(#shadow)"/>
    <text x="2276" y="334" class="label">Why this wall matters</text>
    <text x="2276" y="382" class="small">1. It is the only uninterrupted 298 cm storage wall.</text>
    <text x="2276" y="420" class="small">2. Four large boxes fit per full shelf run with sensible clearance.</text>
    <text x="2276" y="458" class="small">3. The centre aligns with the door opening, so the most-used bay is directly reachable.</text>
    <text x="2276" y="496" class="small">4. The long ladder lives here instead of consuming short-wall depth.</text>
    <text x="2276" y="560" class="label">Suggested loading order</text>
    <text x="2276" y="598" class="small">Bottom shelf: heavy tools, paint trays, dense storage.</text>
    <text x="2276" y="636" class="small">Middle shelves: the nine 60 x 40 x 26 cm boxes.</text>
    <text x="2276" y="674" class="small">Top shelf: infrequent boxes and archive items.</text>
  </g>
