<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="3400" height="1500" viewBox="0 0 3400 1500">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <style>
    text { font-family: Helvetica, Arial, sans-serif; fill: #24313a; }
    .title { font-size: 38px; font-weight: 700; }
    .subtitle { font-size: 20px; fill: #6f7c82; }
    .label { font-size: 20px; font-weight: 700; }
    .small { font-size: 16px; fill: #6f7c82; }
    .dim { font-size: 17px; font-weight: 700; fill: #6f7c82; }
  </style>
  <rect x="0" y="0" width="3400" height="1500" fill="#f5efe4"/>

  <text x="160" y="120" class="title">Back Wall Elevation</text>
  <text x="160" y="156" class="subtitle">42 cm shelf spine aligned with the apex roof, with the 2.0 m ladder on a high rack above the working shelf field.</text>

  <rect x="160" y="250" width="3080" height="1080" rx="24" fill="#fffaf1" filter="url(#shadow)"/>

  <g transform="translate(250 320)">
    <polygon points="0,930 0,110 1200,0 2400,110 2400,930" fill="#fcf8f0" stroke="#24313a" stroke-width="4"/>

    <line x1="0" y1="785" x2="2400" y2="785" stroke="#5e7754" stroke-width="3"/>
    <line x1="0" y1="615" x2="2400" y2="615" stroke="#5e7754" stroke-width="3"/>
    <line x1="0" y1="435" x2="2400" y2="435" stroke="#5e7754" stroke-width="3"/>
    <line x1="0" y1="250" x2="2400" y2="250" stroke="#5e7754" stroke-width="3"/>
    <line x1="0" y1="85" x2="2400" y2="85" stroke="#5e7754" stroke-width="3"/>

    <line x1="644" y1="110" x2="644" y2="930" stroke="#5e7754" stroke-width="3"/>
    <line x1="1756" y1="110" x2="1756" y2="930" stroke="#5e7754" stroke-width="3"/>

    <rect x="70" y="670" width="430" height="90" fill="#d5e8e5" stroke="#24313a" stroke-width="2"/>
    <rect x="730" y="670" width="430" height="90" fill="#d5e8e5" stroke="#24313a" stroke-width="2"/>
    <rect x="1240" y="670" width="430" height="90" fill="#d5e8e5" stroke="#24313a" stroke-width="2"/>
    <rect x="1890" y="670" width="430" height="90" fill="#d5e8e5" stroke="#24313a" stroke-width="2"/>

    <rect x="70" y="495" width="300" height="92" fill="#e9d7c8" stroke="#24313a" stroke-width="2"/>
    <rect x="420" y="495" width="160" height="92" fill="#e2ebef" stroke="#24313a" stroke-width="2"/>
    <rect x="730" y="495" width="300" height="92" fill="#d9eef6" stroke="#24313a" stroke-width="2"/>
    <rect x="1060" y="495" width="300" height="92" fill="#d9eef6" stroke="#24313a" stroke-width="2"/>
    <rect x="1390" y="495" width="300" height="92" fill="#e8eef0" stroke="#24313a" stroke-width="2"/>
    <rect x="1820" y="495" width="250" height="92" fill="#e9d7c8" stroke="#24313a" stroke-width="2"/>
    <rect x="2100" y="495" width="210" height="92" fill="#e9d7c8" stroke="#24313a" stroke-width="2"/>

    <rect x="80" y="315" width="240" height="78" fill="#d9eef6" stroke="#24313a" stroke-width="2"/>
    <rect x="350" y="315" width="180" height="78" fill="#d9eef6" stroke="#24313a" stroke-width="2"/>
    <rect x="740" y="315" width="250" height="78" fill="#d5e8e5" stroke="#24313a" stroke-width="2"/>
    <rect x="1015" y="315" width="250" height="78" fill="#d5e8e5" stroke="#24313a" stroke-width="2"/>
    <rect x="1290" y="315" width="250" height="78" fill="#e9d7c8" stroke="#24313a" stroke-width="2"/>
    <rect x="1565" y="315" width="250" height="78" fill="#d9eef6" stroke="#24313a" stroke-width="2"/>
    <rect x="1840" y="315" width="210" height="78" fill="#d9eef6" stroke="#24313a" stroke-width="2"/>
    <rect x="2075" y="315" width="210" height="78" fill="#e8eef0" stroke="#24313a" stroke-width="2"/>

    <rect x="730" y="135" width="940" height="58" fill="#efe2cd" stroke="#24313a" stroke-width="2"/>
    <line x1="795" y1="158" x2="1605" y2="158" stroke="#b73f2d" stroke-width="6"/>

    <text x="150" y="560" class="small">paint trays</text>
    <text x="812" y="560" class="small">60 x 40 box pair</text>
    <text x="1430" y="560" class="small">mixed boxes</text>
    <text x="1930" y="560" class="small">paint + archive</text>
    <text x="820" y="175" class="small">2.0 m ladder rack</text>
    <text x="980" y="845" class="small">lower heavy-tool shelf</text>

    <text x="145" y="960" class="small">80 cm bay</text>
    <text x="1040" y="960" class="small">138 cm centre bay</text>
    <text x="1985" y="960" class="small">80 cm bay</text>
  </g>

  <g transform="translate(2740 345)">
    <text x="0" y="0" class="label">Heights</text>
    <text x="0" y="60" class="small">182 cm ladder rack</text>
    <text x="0" y="92" class="small">142 cm upper shelf</text>
    <text x="0" y="124" class="small">104 cm eye-level shelf</text>
    <text x="0" y="156" class="small">68 cm mid box shelf</text>
    <text x="0" y="188" class="small">34 cm lower heavy shelf</text>
    <text x="0" y="220" class="small">Centre peak reaches 217.9 cm.</text>
  </g>

  <g transform="translate(180 1260)">
    <text x="0" y="0" class="label">Notes</text>
    <text x="0" y="40" class="small">The back wall takes the repeatable storage logic: one box in each side bay and two in the centre bay per shelf run.</text>
    <text x="0" y="72" class="small">The apex roof is used for the high ladder rack and a short centre-top shelf for light, long-term storage only.</text>
  </g>
</svg>
