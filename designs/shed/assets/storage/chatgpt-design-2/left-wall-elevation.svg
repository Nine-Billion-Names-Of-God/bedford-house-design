<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="2000" height="1800" viewBox="0 0 2000 1800">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="6" refY="6" orient="auto-start-reverse">
      <path d="M 0 6 L 12 0 L 9 6 L 12 12 z" fill="#6b7b84" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <style>
    text { font-family: Helvetica, Arial, sans-serif; fill: #22313a; }
    .title { font-size: 34px; font-weight: 700; }
    .subtitle { font-size: 20px; fill: #61727b; }
    .label { font-size: 22px; font-weight: 700; }
    .small { font-size: 18px; fill: #61727b; }
    .tiny { font-size: 16px; fill: #61727b; }
    .dim { font-size: 18px; font-weight: 700; fill: #61727b; }
  </style>
  <rect x="0" y="0" width="2000" height="1800" fill="#f4efe4"/>
  <g transform="translate(90 70) scale(0.54)">
    <text x="0" y="0" class="title">Left Wall Elevation · ChatGPT Design 2</text>
    <text x="0" y="40" class="subtitle">175 cm wall length · rear 120 cm deep tile dock · front kept shallow for ladder clips and window light</text>
    <rect x="0" y="88" width="920" height="124" rx="18" fill="#fff9ef" stroke="#d0c2aa" stroke-width="2" filter="url(#shadow)"/>
    <text x="28" y="134" class="label">Left-wall role</text>
    <text x="28" y="172" class="small">This wall solves the hardest item in the brief: the 60 x 120 cm tile stack, kept low and honest.</text>
    <rect x="240" y="320" width="1050" height="760" rx="0" fill="#fffaf2" stroke="#233139" stroke-width="4" filter="url(#shadow)"/>
    <rect x="240" y="912.0" width="720.0" height="368.0" rx="0" fill="#e2bca1" stroke="#8b5435" stroke-width="3" />
    <rect x="286" y="1192.0" width="628.0" height="56" rx="10" fill="#dcc7a6" stroke="#8b7158" stroke-width="2" />
    <text x="312" y="1230.0" class="label">tiles flat on low deck</text>
    <text x="312" y="956.0" class="label">120 x 60 cm dock</text>
    <text x="312" y="990.0" class="small">top used for tile extras or rare bulky storage</text>
    <rect x="258" y="636.0" width="540" height="44" rx="10" fill="#f7efe3" stroke="#cba782" stroke-width="2" />
    <text x="286" y="666.0" class="small">rear upper shelf only</text>
    <line x1="1000.0" y1="360" x2="1000.0" y2="1240" stroke="#d0d7dd" stroke-width="2" stroke-dasharray="10 8"/>
    <text x="1024.0" y="396" class="small">front 55 cm stays light</text>
    <line x1="1080.0" y1="840" x2="1222" y2="1110" stroke="#d96355" stroke-width="10" />
    <text x="1108.0" y="794" class="label">folded ladder clips</text>
    <line x1="1140.0" y1="924" x2="1194" y2="924" stroke="#8ba9bc" stroke-width="8" />
    <text x="1156.0" y="892" class="small">spare long-handle hooks</text>
    <text x="256" y="356" class="dim">190 cm wall height</text>
    <line x1="240" y1="1356" x2="1290" y2="1356" stroke="#60707a" stroke-width="3" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <line x1="240" y1="1338" x2="240" y2="1374" stroke="#c8b99f" stroke-width="2" />
    <line x1="1290" y1="1338" x2="1290" y2="1374" stroke="#c8b99f" stroke-width="2" />
    <text x="765" y="1348" class="dim" text-anchor="middle">175 cm wall length</text>
    <line x1="240" y1="242" x2="960" y2="242" stroke="#60707a" stroke-width="3" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <line x1="240" y1="224" x2="240" y2="260" stroke="#c8b99f" stroke-width="2" />
    <line x1="960" y1="224" x2="960" y2="260" stroke="#c8b99f" stroke-width="2" />
    <text x="600" y="234" class="dim" text-anchor="middle">120 cm rear deep-dock run</text>
    <line x1="960" y1="278" x2="1290" y2="278" stroke="#60707a" stroke-width="3" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <line x1="960" y1="260" x2="960" y2="296" stroke="#c8b99f" stroke-width="2" />
    <line x1="1290" y1="260" x2="1290" y2="296" stroke="#c8b99f" stroke-width="2" />
    <text x="1125" y="270" class="dim" text-anchor="middle">55 cm front strip</text>
    <line x1="138" y1="912.0" x2="138" y2="1280" stroke="#60707a" stroke-width="3" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <line x1="120" y1="912.0" x2="156" y2="912.0" stroke="#c8b99f" stroke-width="2" />
    <line x1="120" y1="1280" x2="156" y2="1280" stroke="#c8b99f" stroke-width="2" />
    <text x="152" y="1096.0" class="dim">92 cm dock top</text>
    <line x1="1382" y1="1248.0" x2="1382" y2="1280" stroke="#60707a" stroke-width="3" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <line x1="1364" y1="1248.0" x2="1400" y2="1248.0" stroke="#c8b99f" stroke-width="2" />
    <line x1="1364" y1="1280" x2="1400" y2="1280" stroke="#c8b99f" stroke-width="2" />
    <text x="1396" y="1264.0" class="dim">8 cm raised tile deck</text>
    <rect x="1580" y="320" width="1180" height="438" rx="18" fill="#fff9ef" stroke="#d0c2aa" stroke-width="2" filter="url(#shadow)"/>
    <text x="1614" y="366" class="label">Why the left wall gets the deep bay</text>
    <text x="1614" y="410" class="small">1. The tile size matches the footprint almost exactly: 120 cm along the wall and 60 cm out.</text>
    <text x="1614" y="448" class="small">2. Keeping tiles flat and low is safer than standing them against light shed cladding.</text>
    <text x="1614" y="486" class="small">3. This wall is quieter, so dense infrequent storage belongs here instead of on the active bench side.</text>
    <text x="1614" y="538" class="small">The front end stays deliberately shallow so the front-side window still contributes light.</text>
    <text x="1614" y="590" class="label">Optional detail</text>
    <text x="1614" y="630" class="small">Add a 20-25 mm front lip to the tile deck and top surface so stacked materials cannot creep forward.</text>
  </g>
</svg>
