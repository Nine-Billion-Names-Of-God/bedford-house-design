<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="3200" height="1400" viewBox="0 0 3200 1400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <style>
    text { font-family: Helvetica, Arial, sans-serif; fill: #24313a; }
    .title { font-size: 38px; font-weight: 700; }
    .subtitle { font-size: 20px; fill: #6f7c82; }
    .label { font-size: 20px; font-weight: 700; }
    .small { font-size: 16px; fill: #6f7c82; }
  </style>
  <rect x="0" y="0" width="3200" height="1400" fill="#f5efe4"/>

  <text x="160" y="120" class="title">Left Wall Elevation</text>
  <text x="160" y="156" class="subtitle">Rear 120 cm carries the 60 cm deep tile dock. Front 55 cm stays shallow for the folding ladder and long tools.</text>

  <rect x="160" y="250" width="2880" height="1020" rx="24" fill="#fffaf1" filter="url(#shadow)"/>

  <g transform="translate(260 340)">
    <rect x="0" y="0" width="2100" height="950" fill="#fcf8f0" stroke="#24313a" stroke-width="4"/>
    <line x1="0" y1="80" x2="2100" y2="80" stroke="#d7ccb9" stroke-width="2"/>

    <rect x="0" y="460" width="1440" height="28" fill="#6a8f92"/>
    <rect x="0" y="748" width="1440" height="56" fill="#6a8f92"/>
    <rect x="0" y="812" width="1440" height="88" fill="#c4dad9" stroke="#24313a" stroke-width="2"/>
    <rect x="0" y="540" width="1440" height="180" fill="#bed8d8" stroke="#24313a" stroke-width="2"/>
    <rect x="120" y="840" width="1200" height="44" fill="#e2ebef" stroke="#24313a" stroke-width="2"/>
    <rect x="120" y="862" width="1200" height="28" fill="#d7c7b6" stroke="#24313a" stroke-width="1"/>

    <rect x="1550" y="280" width="70" height="560" fill="#e8eef0" stroke="#24313a" stroke-width="2"/>
    <rect x="1650" y="380" width="42" height="420" fill="#e8eef0" stroke="#24313a" stroke-width="2"/>
    <rect x="1715" y="320" width="22" height="210" fill="#e8eef0" stroke="#24313a" stroke-width="2"/>
    <line x1="1510" y1="260" x2="1760" y2="260" stroke="#41696a" stroke-width="4"/>

    <line x1="1440" y1="0" x2="1440" y2="950" stroke="#d7ccb9" stroke-width="3"/>

    <text x="220" y="615" class="small">deep staging top at 96 cm</text>
    <text x="220" y="914" class="small">tile deck at low level</text>
    <text x="220" y="438" class="small">upper shelf at 145 cm</text>
    <text x="1510" y="228" class="small">shallow clip rail</text>
    <text x="1510" y="882" class="small">folding ladder + long tools</text>
    <text x="250" y="1000" class="small">rear 120 cm deep dock</text>
    <text x="1580" y="1000" class="small">front 55 cm shallow strip</text>
  </g>

  <g transform="translate(2510 360)">
    <text x="0" y="0" class="label">Key uses</text>
    <text x="0" y="54" class="small">Tiles stay low on a full-width deck.</text>
    <text x="0" y="86" class="small">The dock top gives one honest deep landing area.</text>
    <text x="0" y="118" class="small">The front section stays light and clipped to the wall.</text>
  </g>

  <g transform="translate(180 1260)">
    <text x="0" y="0" class="label">Construction note</text>
    <text x="0" y="40" class="small">Treat the left dock as a short, heavily supported bench-height carcass on a continuous base so the tile load spreads properly into the shed floor.</text>
  </g>
</svg>
