<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="3200" height="1400" viewBox="0 0 3200 1400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <style>
    text { font-family: Helvetica, Arial, sans-serif; fill: #24313a; }
    .title { font-size: 38px; font-weight: 700; }
    .subtitle { font-size: 20px; fill: #6f7c82; }
    .label { font-size: 20px; font-weight: 700; }
    .small { font-size: 16px; fill: #6f7c82; }
  </style>
  <rect x="0" y="0" width="3200" height="1400" fill="#f5efe4"/>

  <text x="160" y="120" class="title">Right Wall Elevation</text>
  <text x="160" y="156" class="subtitle">Rear 110 cm becomes the active workbench and tool wall. Front 65 cm keeps a low BBQ pocket with cutters on a shallow rail above.</text>

  <rect x="160" y="250" width="2880" height="1020" rx="24" fill="#fffaf1" filter="url(#shadow)"/>

  <g transform="translate(260 340)">
    <rect x="0" y="0" width="2100" height="950" fill="#fcf8f0" stroke="#24313a" stroke-width="4"/>
    <line x1="0" y1="80" x2="2100" y2="80" stroke="#d7ccb9" stroke-width="2"/>

    <rect x="0" y="602" width="1320" height="44" fill="#915532"/>
    <rect x="0" y="646" width="1320" height="204" fill="#e4c4aa" stroke="#24313a" stroke-width="2"/>
    <rect x="110" y="670" width="430" height="160" fill="#d8e5ea" stroke="#24313a" stroke-width="2"/>
    <rect x="620" y="690" width="430" height="140" fill="#e9d7c8" stroke="#24313a" stroke-width="2"/>

    <rect x="0" y="330" width="1320" height="30" fill="#915532"/>
    <rect x="0" y="360" width="1320" height="180" fill="#f3ece2" stroke="#24313a" stroke-width="2"/>
    <line x1="90" y1="410" x2="1230" y2="410" stroke="#41696a" stroke-width="4"/>
    <line x1="170" y1="440" x2="1130" y2="440" stroke="#41696a" stroke-width="4"/>
    <circle cx="220" cy="470" r="10" fill="#41696a"/>
    <circle cx="320" cy="470" r="10" fill="#41696a"/>
    <circle cx="420" cy="470" r="10" fill="#41696a"/>
    <rect x="540" y="450" width="120" height="18" fill="#41696a"/>
    <rect x="720" y="450" width="120" height="18" fill="#41696a"/>
    <rect x="900" y="450" width="120" height="18" fill="#41696a"/>

    <rect x="1470" y="500" width="360" height="330" rx="18" fill="#d9d0c2" stroke="#7c6756" stroke-width="3"/>
    <line x1="1450" y1="330" x2="1920" y2="330" stroke="#41696a" stroke-width="5"/>
    <line x1="1500" y1="390" x2="1770" y2="390" stroke="#41696a" stroke-width="4"/>
    <line x1="1540" y1="450" x2="1750" y2="450" stroke="#41696a" stroke-width="4"/>
    <line x1="1590" y1="510" x2="1740" y2="510" stroke="#41696a" stroke-width="4"/>

    <line x1="1320" y1="0" x2="1320" y2="950" stroke="#d7ccb9" stroke-width="3"/>

    <text x="150" y="786" class="small">Kärcher under bench</text>
    <text x="660" y="786" class="small">toolbox / dense cases</text>
    <text x="180" y="316" class="small">shallow upper shelf</text>
    <text x="180" y="388" class="small">tool board + daily hand tools</text>
    <text x="1498" y="878" class="small">BBQ low pocket</text>
    <text x="1486" y="294" class="small">front cutter rail</text>
    <text x="280" y="1000" class="small">rear 110 cm workbench wall</text>
    <text x="1504" y="1000" class="small">front 65 cm shallow / low zone</text>
  </g>

  <g transform="translate(2510 360)">
    <text x="0" y="0" class="label">Key uses</text>
    <text x="0" y="54" class="small">This is the frequent-use wall.</text>
    <text x="0" y="86" class="small">Small hand tools stay visible on the rear tool board.</text>
    <text x="0" y="118" class="small">Loppers and hedge shears stay on the front shallow rail.</text>
    <text x="0" y="150" class="small">Heavy loose items stay low under the bench.</text>
  </g>

  <g transform="translate(180 1260)">
    <text x="0" y="0" class="label">Construction note</text>
    <text x="0" y="40" class="small">Because the shed wall is thin, the tool board should be screwed into a timber-backed frame or plywood panel fixed back to the bench framing and studs, not into cladding alone.</text>
  </g>
</svg>
