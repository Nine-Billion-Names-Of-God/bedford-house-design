<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="3600" height="3600" viewBox="0 0 3600 3600">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="6" refY="6" orient="auto-start-reverse">
      <path d="M 0 6 L 12 0 L 9 6 L 12 12 z" fill="#6b7b84" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <style>
    text { font-family: Helvetica, Arial, sans-serif; fill: #22313a; }
    .title { font-size: 34px; font-weight: 700; }
    .subtitle { font-size: 19px; fill: #61727b; }
    .label { font-size: 20px; font-weight: 700; }
    .small { font-size: 16px; fill: #61727b; }
    .tiny { font-size: 14px; fill: #61727b; }
    .dim { font-size: 16px; font-weight: 700; fill: #61727b; }
  </style>
  <rect x="0" y="0" width="3600" height="3600" fill="#f3eee4"/>
  <g transform="translate(280 760) scale(0.82)">
    <text x="0" y="0" class="title">Back Wall Elevation</text>
    <text x="0" y="36" class="subtitle">298 cm wall width · 42 cm deep shelving spine · highest point at centre under the apex</text>

    <rect x="0" y="78" width="560" height="120" rx="18" fill="#fff9ef" filter="url(#shadow)"/>
    <text x="28" y="118" class="label">Elevation logic</text>
    <text x="28" y="150" class="small">Low heavy shelves, repeated box shelves mid-height, long ladder high, centre-only apex cubby above.</text>

    <g transform="translate(230 240)">
      <path d="M 0 760 L 0 100 L 595 20 L 1190 100 L 1190 760 Z" fill="#fffaf1" stroke="#25343b" stroke-width="4" filter="url(#shadow)"/>
      <path d="M 0 760 L 0 100 L 595 20 L 1190 100 L 1190 760" fill="#e6efe4" stroke="none"/>

      <line x1="0" y1="661" x2="1190" y2="661" stroke="#6a845f" stroke-width="6"/>
      <line x1="0" y1="552" x2="1190" y2="552" stroke="#6a845f" stroke-width="6"/>
      <line x1="0" y1="443" x2="1190" y2="443" stroke="#6a845f" stroke-width="6"/>
      <line x1="0" y1="334" x2="1190" y2="334" stroke="#6a845f" stroke-width="6"/>
      <line x1="0" y1="204" x2="1190" y2="204" stroke="#6a845f" stroke-width="6"/>

      <line x1="100" y1="146" x2="1090" y2="146" stroke="#415f62" stroke-width="10"/>
      <circle cx="220" cy="146" r="14" fill="#415f62"/>
      <circle cx="970" cy="146" r="14" fill="#415f62"/>

      <rect x="420" y="52" width="350" height="56" rx="12" fill="#eadfc6" stroke="#8a7658" stroke-width="3"/>
      <text x="595" y="87" class="small" text-anchor="middle">centre-only apex cubby</text>

      <line x1="396" y1="760" x2="396" y2="100" stroke="#5b7653" stroke-width="8"/>
      <line x1="794" y1="760" x2="794" y2="100" stroke="#5b7653" stroke-width="8"/>

      <rect x="66" y="582" width="250" height="58" rx="12" fill="#f6efe2" stroke="#a67a57" stroke-width="2"/>
      <text x="190" y="617" class="small" text-anchor="middle">B1 large boxes</text>
      <rect x="470" y="582" width="250" height="58" rx="12" fill="#f6efe2" stroke="#a67a57" stroke-width="2"/>
      <text x="595" y="617" class="small" text-anchor="middle">B2 two boxes</text>
      <rect x="876" y="582" width="250" height="58" rx="12" fill="#f6efe2" stroke="#a67a57" stroke-width="2"/>
      <text x="1000" y="617" class="small" text-anchor="middle">B3 paints / boxes</text>

      <rect x="66" y="475" width="250" height="58" rx="12" fill="#f6efe2" stroke="#a67a57" stroke-width="2"/>
      <text x="190" y="510" class="small" text-anchor="middle">large boxes</text>
      <rect x="470" y="475" width="250" height="58" rx="12" fill="#f6efe2" stroke="#a67a57" stroke-width="2"/>
      <text x="595" y="510" class="small" text-anchor="middle">large boxes</text>
      <rect x="876" y="475" width="250" height="58" rx="12" fill="#f6efe2" stroke="#a67a57" stroke-width="2"/>
      <text x="1000" y="510" class="small" text-anchor="middle">large boxes</text>

      <rect x="86" y="365" width="210" height="52" rx="12" fill="#f6efe2" stroke="#a67a57" stroke-width="2"/>
      <text x="190" y="397" class="small" text-anchor="middle">medium boxes</text>
      <rect x="448" y="365" width="294" height="52" rx="12" fill="#eef4e6" stroke="#5c7359" stroke-width="2"/>
      <text x="595" y="397" class="small" text-anchor="middle">active shelf field</text>
      <rect x="894" y="365" width="190" height="52" rx="12" fill="#f1e0d8" stroke="#9a6c58" stroke-width="2"/>
      <text x="990" y="397" class="small" text-anchor="middle">paint trays</text>

      <rect x="86" y="690" width="210" height="48" rx="12" fill="#d9e5d5" stroke="#5c7359" stroke-width="2"/>
      <text x="190" y="720" class="small" text-anchor="middle">heavy tools low</text>
      <rect x="870" y="690" width="250" height="48" rx="12" fill="#d9e5d5" stroke="#5c7359" stroke-width="2"/>
      <text x="994" y="720" class="small" text-anchor="middle">dense boxes low</text>

      <text x="80" y="790" class="tiny">left corner height 190 cm</text>
      <text x="520" y="14" class="tiny">centre height 217.9 cm</text>
      <text x="930" y="790" class="tiny">right corner height 190 cm</text>
    </g>

    <g transform="translate(150 240)">
      <line x1="0" y1="1000" x2="0" y2="260" stroke="#6b7b84" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
      <line x1="-18" y1="260" x2="18" y2="260" stroke="#c8b99f" stroke-width="2"/>
      <line x1="-18" y1="1000" x2="18" y2="1000" stroke="#c8b99f" stroke-width="2"/>
      <text x="14" y="640" class="dim">190 cm at wall edges</text>

      <line x1="70" y1="240" x2="70" y2="1000" stroke="#6b7b84" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
      <text x="84" y="610" class="dim">217.9 cm at centre</text>
    </g>

    <g transform="translate(450 1040)">
      <line x1="0" y1="0" x2="1190" y2="0" stroke="#6b7b84" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
      <line x1="0" y1="-18" x2="0" y2="18" stroke="#c8b99f" stroke-width="2"/>
      <line x1="1190" y1="-18" x2="1190" y2="18" stroke="#c8b99f" stroke-width="2"/>
      <text x="595" y="-8" class="dim" text-anchor="middle">298 cm overall width</text>
    </g>

    <g transform="translate(1870 248)">
      <rect x="0" y="0" width="1030" height="620" rx="18" fill="#fff9ef" filter="url(#shadow)"/>
      <text x="34" y="48" class="label">Shelf heights</text>
      <text x="34" y="92" class="small">32 cm low shelf: heavy tools, dense paint trays</text>
      <text x="34" y="128" class="small">64 cm and 96 cm: primary 60 x 40 box levels</text>
      <text x="34" y="164" class="small">128 cm: medium boxes and less-used tools</text>
      <text x="34" y="200" class="small">166 cm: light-only top shelf</text>
      <text x="34" y="236" class="small">182 cm underside: long ladder rack across the centre</text>
      <text x="34" y="272" class="small">205 cm: centre-only apex cubby</text>

      <text x="34" y="334" class="label">Why the back wall carries the most height</text>
      <text x="34" y="376" class="small">The apex roof gives the back wall centre the only place where full-height</text>
      <text x="34" y="410" class="small">storage can grow upward without crowding the window-side short walls.</text>

      <text x="34" y="472" class="label">Box-fit summary</text>
      <text x="34" y="514" class="small">82 cm side bay = 1 large 60 x 40 box per shelf.</text>
      <text x="34" y="548" class="small">134 cm centre bay = 2 large boxes per shelf.</text>
      <text x="34" y="582" class="small">Three repeated shelf levels hold 12 large boxes, enough for the 9 known boxes.</text>
    </g>
  </g>
</svg>
