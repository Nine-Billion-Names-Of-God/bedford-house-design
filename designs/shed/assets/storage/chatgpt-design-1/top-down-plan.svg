    <rect x="2140" y="276" width="812" height="330" rx="18" fill="#fff9ef" filter="url(#shadow)"/>
    <text x="2174" y="322" class="label">Storage logic</text>
    <text x="2174" y="362" class="small">1. Full back wall handles the repeatable box storage.</text>
    <text x="2174" y="396" class="small">2. Single rear-left dock provides the only true 60 cm deep zone.</text>
    <text x="2174" y="430" class="small">3. Rear-right wall stays active as the workbench and tool wall.</text>
    <text x="2174" y="464" class="small">4. Front-side strips stay open or shallow to protect light and access.</text>
    <text x="2174" y="512" class="label">Bulky items shown in plan</text>
    <text x="2174" y="548" class="small">Tiles on left dock, BBQ front-right, Kärcher and toolbox under bench,</text>
    <text x="2174" y="580" class="small">long ladder on back-wall rack, folding ladder on left-front strip.</text>

    <rect x="2140" y="670" width="690" height="286" rx="18" fill="#fff9ef" filter="url(#shadow)"/>
