    <rect x="2176" y="798" width="32" height="24" fill="#e4c0a4" stroke="#8d5537" stroke-width="2"/>
    <text x="2228" y="816" class="small">60 cm rear-left tile dock</text>
    <rect x="2176" y="842" width="32" height="24" fill="#cfe3e3" stroke="#446a6a" stroke-width="2"/>
    <text x="2228" y="860" class="small">42 cm rear-right workbench</text>
    <rect x="2176" y="886" width="32" height="24" fill="#eef2e9" stroke="#657b62" stroke-width="2"/>
    <text x="2228" y="904" class="small">Open floor-based bulky-item pocket</text>
    <text x="2176" y="944" class="small">Safe area maintained around all labels for robust PNG export.</text>
