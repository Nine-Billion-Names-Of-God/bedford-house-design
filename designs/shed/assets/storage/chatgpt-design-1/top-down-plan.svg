    <line x1="1310" y1="430" x2="1310" y2="1095" stroke="#6b7b84" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <line x1="1292" y1="430" x2="1328" y2="430" stroke="#c8b99f" stroke-width="2"/>
