<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="3600" height="3600" viewBox="0 0 3600 3600">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="6" refY="6" orient="auto-start-reverse">
      <path d="M 0 6 L 12 0 L 9 6 L 12 12 z" fill="#6b7b84" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <style>
    text { font-family: Helvetica, Arial, sans-serif; fill: #22313a; }
    .title { font-size: 34px; font-weight: 700; }
    .subtitle { font-size: 19px; fill: #61727b; }
    .label { font-size: 20px; font-weight: 700; }
    .small { font-size: 16px; fill: #61727b; }
    .tiny { font-size: 14px; fill: #61727b; }
    .dim { font-size: 16px; font-weight: 700; fill: #61727b; }
  </style>
  <rect x="0" y="0" width="3600" height="3600" fill="#f3eee4"/>
  <g transform="translate(280 760) scale(0.82)">
    <text x="0" y="0" class="title">Right Wall Elevation</text>
    <text x="0" y="36" class="subtitle">175 cm wall length · rear 115 cm workbench and tool wall · front 60 cm open BBQ pocket</text>

    <rect x="0" y="78" width="560" height="120" rx="18" fill="#fff9ef" filter="url(#shadow)"/>
    <text x="28" y="118" class="label">Wall role</text>
    <text x="28" y="150" class="small">This is the active daily-use wall: workbench below, hanging tools in the reach zone, shallow consumables shelf above.</text>

    <g transform="translate(300 260)">
      <rect x="0" y="0" width="875" height="760" fill="#fffaf1" stroke="#25343b" stroke-width="4" filter="url(#shadow)"/>
      <rect x="0" y="0" width="875" height="760" fill="#e8f0e6"/>

      <rect x="0" y="0" width="575" height="760" fill="#d4e8e5" stroke="#446a6a" stroke-width="3"/>
      <rect x="575" y="0" width="300" height="760" fill="#eef2e9" stroke="#657b62" stroke-width="2"/>

      <rect x="36" y="396" width="503" height="34" fill="#c9ddd8" stroke="#4f6f66" stroke-width="2"/>
      <rect x="36" y="136" width="503" height="32" fill="#e8dfc5" stroke="#8a7658" stroke-width="2"/>
      <rect x="36" y="318" width="503" height="40" fill="#dbe7d6" stroke="#60785b" stroke-width="2"/>

      <rect x="56" y="432" width="223" height="286" rx="12" fill="#f6efe2" stroke="#a67a57" stroke-width="2"/>
      <text x="167" y="580" class="small" text-anchor="middle">Kärcher below bench</text>
      <rect x="300" y="452" width="192" height="246" rx="12" fill="#f1e2d7" stroke="#9a6c58" stroke-width="2"/>
      <text x="396" y="582" class="small" text-anchor="middle">toolbox / heavy crate</text>

      <rect x="610" y="452" width="198" height="248" rx="12" fill="#dde8db" stroke="#5b7353" stroke-width="2"/>
      <text x="709" y="582" class="small" text-anchor="middle">BBQ parking pocket</text>

      <circle cx="216" cy="232" r="12" fill="#60785b"/>
      <circle cx="316" cy="232" r="12" fill="#60785b"/>
      <circle cx="416" cy="232" r="12" fill="#60785b"/>
      <circle cx="216" cy="272" r="12" fill="#60785b"/>
      <circle cx="316" cy="272" r="12" fill="#60785b"/>
      <circle cx="416" cy="272" r="12" fill="#60785b"/>
      <rect x="104" y="220" width="78" height="26" rx="10" fill="#c9ddd8" stroke="#4f6f66" stroke-width="2"/>
      <text x="144" y="238" class="tiny" text-anchor="middle">gloves</text>
      <rect x="470" y="212" width="44" height="90" rx="12" fill="#dce8df" stroke="#4f6f66" stroke-width="2"/>
      <text x="492" y="257" class="tiny" transform="rotate(-90 492 257)" text-anchor="middle">saw</text>

      <line x1="70" y1="368" x2="505" y2="368" stroke="#4f6f66" stroke-width="6"/>
      <rect x="122" y="336" width="52" height="22" rx="8" fill="#dce8df" stroke="#4f6f66" stroke-width="2"/>
      <rect x="244" y="334" width="58" height="24" rx="8" fill="#dce8df" stroke="#4f6f66" stroke-width="2"/>
      <rect x="374" y="332" width="74" height="26" rx="8" fill="#dce8df" stroke="#4f6f66" stroke-width="2"/>
      <text x="160" y="329" class="tiny" text-anchor="middle">pruners</text>
      <text x="274" y="329" class="tiny" text-anchor="middle">trowels</text>
      <text x="410" y="327" class="tiny" text-anchor="middle">loppers / shears</text>

      <rect x="612" y="250" width="182" height="34" fill="#e8dfc5" stroke="#8a7658" stroke-width="2"/>
      <text x="703" y="272" class="tiny" text-anchor="middle">shallow shelf above BBQ</text>

      <text x="36" y="790" class="small">back corner</text>
      <text x="700" y="790" class="small">front toward window / door</text>
    </g>

    <g transform="translate(190 260)">
      <line x1="0" y1="760" x2="0" y2="0" stroke="#6b7b84" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
      <line x1="-18" y1="0" x2="18" y2="0" stroke="#c8b99f" stroke-width="2"/>
      <line x1="-18" y1="760" x2="18" y2="760" stroke="#c8b99f" stroke-width="2"/>
      <text x="14" y="390" class="dim">190 cm wall height</text>

      <line x1="70" y1="396" x2="70" y2="760" stroke="#6b7b84" stroke-width="2"/>
      <text x="84" y="590" class="dim">91 cm bench top</text>
      <line x1="70" y1="318" x2="70" y2="760" stroke="#6b7b84" stroke-width="2"/>
      <text x="84" y="544" class="dim">118 cm tool rail</text>
      <line x1="70" y1="136" x2="70" y2="760" stroke="#6b7b84" stroke-width="2"/>
      <text x="84" y="446" class="dim">136 cm shelf</text>
      <line x1="70" y1="80" x2="70" y2="760" stroke="#6b7b84" stroke-width="2"/>
      <text x="84" y="410" class="dim">170 cm tool-board top</text>
    </g>

    <g transform="translate(300 1070)">
      <line x1="0" y1="0" x2="875" y2="0" stroke="#6b7b84" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
      <line x1="0" y1="-18" x2="0" y2="18" stroke="#c8b99f" stroke-width="2"/>
      <line x1="875" y1="-18" x2="875" y2="18" stroke="#c8b99f" stroke-width="2"/>
      <text x="438" y="-8" class="dim" text-anchor="middle">175 cm total length</text>

      <line x1="0" y1="62" x2="575" y2="62" stroke="#6b7b84" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
      <line x1="0" y1="44" x2="0" y2="80" stroke="#c8b99f" stroke-width="2"/>
      <line x1="575" y1="44" x2="575" y2="80" stroke="#c8b99f" stroke-width="2"/>
      <text x="288" y="54" class="dim" text-anchor="middle">115 cm active work zone</text>

      <line x1="575" y1="118" x2="875" y2="118" stroke="#6b7b84" stroke-width="2" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
      <line x1="575" y1="100" x2="575" y2="136" stroke="#c8b99f" stroke-width="2"/>
      <line x1="875" y1="100" x2="875" y2="136" stroke="#c8b99f" stroke-width="2"/>
      <text x="725" y="110" class="dim" text-anchor="middle">60 cm front BBQ pocket</text>
    </g>

    <g transform="translate(1660 250)">
      <rect x="0" y="0" width="1160" height="670" rx="18" fill="#fff9ef" filter="url(#shadow)"/>
      <text x="34" y="48" class="label">Reach-zone planning</text>
      <text x="34" y="92" class="small">95-170 cm above floor is the best range for the most-used hand tools.</text>
      <text x="34" y="126" class="small">That is why the tool board and cutter rail sit above the bench rather than on the back wall.</text>

      <text x="34" y="198" class="label">What belongs here</text>
      <text x="34" y="242" class="small">Secateurs, trowels, hand forks, gloves, pruning saws, loppers, hedge shears, extension cord, fertiliser jars.</text>

      <text x="34" y="314" class="label">What stays low</text>
      <text x="34" y="358" class="small">Kärcher and toolbox remain below the bench so they are easy to pull out and cannot fall from height.</text>

      <text x="34" y="430" class="label">Why the BBQ stays in an open front pocket</text>
      <text x="34" y="474" class="small">The BBQ is about 100 cm tall, so it fits better in an open floor pocket than in enclosed under-bench storage.</text>
      <text x="34" y="508" class="small">Keeping that pocket open avoids building a tall cabinet into the window-side front corner.</text>
    </g>
  </g>
</svg>
