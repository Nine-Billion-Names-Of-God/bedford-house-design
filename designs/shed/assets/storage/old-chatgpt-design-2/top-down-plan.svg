  <rect x="180" y="1260" width="1370" height="360" rx="20" fill="#fffaf1" filter="url(#shadow)"/>
  <text x="220" y="1320" class="label">Plan notes</text>
  <text x="220" y="1360" class="small">1. The left deep dock is intentionally storage-first, not the main workbench.</text>
  <text x="220" y="1392" class="small">2. The right wall becomes the active workbench and hanging-tool zone.</text>
  <text x="220" y="1424" class="small">3. The front wall stays completely free; only the short-wall front strips are used lightly.</text>
  <text x="220" y="1456" class="small">4. The BBQ is shown in a low front-right pocket so it is accounted for without stealing bench space.</text>
  <text x="220" y="1488" class="small">5. Written dimensions in the markdown document remain the source of truth if any graphic label rounds.</text>

