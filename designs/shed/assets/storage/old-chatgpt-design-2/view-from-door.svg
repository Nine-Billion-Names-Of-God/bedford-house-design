<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="3600" height="1600" viewBox="0 0 3600 1600">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <style>
    text { font-family: Helvetica, Arial, sans-serif; fill: #24313a; }
    .title { font-size: 38px; font-weight: 700; }
    .subtitle { font-size: 20px; fill: #6f7c82; }
    .label { font-size: 20px; font-weight: 700; }
    .small { font-size: 16px; fill: #6f7c82; }
  </style>
  <rect x="0" y="0" width="3600" height="1600" fill="#f5efe4"/>

  <text x="160" y="120" class="title">Interior Check Sheet</text>
  <text x="160" y="156" class="subtitle">Left panel: doorway view toward the back wall. Right panel: centre-of-shed check toward the front wall to confirm the doors and windows remain unobstructed.</text>

  <rect x="140" y="250" width="2000" height="1160" rx="24" fill="#fffaf1" filter="url(#shadow)"/>
  <rect x="2260" y="250" width="1200" height="1160" rx="24" fill="#fffaf1" filter="url(#shadow)"/>

  <g transform="translate(220 320)">
    <text x="0" y="0" class="label">From the door looking inward</text>
    <polygon points="90,950 1710,950 1440,760 360,760" fill="#efe7d8" stroke="#cfc2ac" stroke-width="3"/>
    <polygon points="360,760 1440,760 1440,210 900,120 360,210" fill="#f6f0e6" stroke="#d7ccb9" stroke-width="3"/>
    <polygon points="90,950 360,760 360,210 90,430" fill="#fbf7ef" stroke="#d7ccb9" stroke-width="3"/>
    <polygon points="1710,950 1440,760 1440,210 1710,430" fill="#fbf7ef" stroke="#d7ccb9" stroke-width="3"/>

    <rect x="420" y="280" width="960" height="110" fill="#cfe0c7" stroke="#24313a" stroke-width="3"/>
    <rect x="420" y="430" width="960" height="110" fill="#d5e8e5" stroke="#24313a" stroke-width="3"/>
    <rect x="420" y="585" width="960" height="110" fill="#d9eef6" stroke="#24313a" stroke-width="3"/>
    <rect x="420" y="735" width="960" height="105" fill="#e9d7c8" stroke="#24313a" stroke-width="3"/>
    <line x1="700" y1="205" x2="1120" y2="205" stroke="#b73f2d" stroke-width="6"/>

    <polygon points="150,790 360,760 360,470 150,540" fill="#bed8d8" stroke="#24313a" stroke-width="3"/>
    <polygon points="150,910 360,890 360,760 150,790" fill="#6a8f92" stroke="#24313a" stroke-width="3"/>
    <polygon points="1460,780 1665,810 1665,540 1460,470" fill="#e4c4aa" stroke="#24313a" stroke-width="3"/>
    <polygon points="1460,910 1665,930 1665,810 1460,780" fill="#915532" stroke="#24313a" stroke-width="3"/>

    <rect x="1460" y="560" width="145" height="150" fill="#f3ece2" stroke="#24313a" stroke-width="2"/>
    <line x1="1495" y1="595" x2="1605" y2="595" stroke="#41696a" stroke-width="4"/>
    <line x1="1495" y1="635" x2="1580" y2="635" stroke="#41696a" stroke-width="4"/>
    <rect x="300" y="830" width="960" height="52" fill="none" stroke="#6f7c82" stroke-width="2" stroke-dasharray="10 8"/>

    <text x="540" y="242" class="small">high ladder rack above the shelving field</text>
    <text x="730" y="472" class="small">active back-wall box spine</text>
    <text x="166" y="934" class="small">left deep tile dock</text>
    <text x="1470" y="958" class="small">right bench + tool wall</text>
    <text x="640" y="870" class="small">open centre floor area</text>
  </g>

  <g transform="translate(2340 320)">
    <text x="0" y="0" class="label">From the centre looking toward the front wall</text>
    <polygon points="80,960 1010,960 810,760 280,760" fill="#efe7d8" stroke="#cfc2ac" stroke-width="3"/>
    <polygon points="280,760 810,760 810,230 545,170 280,230" fill="#f6f0e6" stroke="#d7ccb9" stroke-width="3"/>
    <polygon points="80,960 280,760 280,230 80,430" fill="#fbf7ef" stroke="#d7ccb9" stroke-width="3"/>
    <polygon points="1010,960 810,760 810,230 1010,430" fill="#fbf7ef" stroke="#d7ccb9" stroke-width="3"/>

    <rect x="360" y="350" width="130" height="255" fill="#d9eef6" stroke="#24313a" stroke-width="3"/>
    <rect x="602" y="310" width="190" height="395" fill="#fffaf1" stroke="#24313a" stroke-width="3"/>
    <line x1="697" y1="310" x2="697" y2="705" stroke="#24313a" stroke-width="3"/>
    <rect x="820" y="350" width="130" height="255" fill="#d9eef6" stroke="#24313a" stroke-width="3"/>

    <rect x="125" y="400" width="42" height="350" fill="#e8eef0" stroke="#24313a" stroke-width="2"/>
    <rect x="1040" y="650" width="100" height="180" rx="14" fill="#d9d0c2" stroke="#7c6756" stroke-width="3"/>
    <line x1="1005" y1="500" x2="1135" y2="500" stroke="#41696a" stroke-width="4"/>
    <line x1="1015" y1="555" x2="1120" y2="555" stroke="#41696a" stroke-width="4"/>

    <text x="340" y="290" class="small">window zone</text>
    <text x="636" y="270" class="small">138 cm double doors</text>
    <text x="825" y="290" class="small">window zone</text>
    <text x="58" y="790" class="small">left shallow ladder strip</text>
    <text x="984" y="865" class="small">right BBQ pocket</text>
    <text x="330" y="908" class="small">front wall remains clear and usable</text>
  </g>

  <g transform="translate(180 1480)">
    <text x="0" y="0" class="small">The second panel is included intentionally so the front-wall non-storage rule is visibly checked rather than assumed.</text>
  </g>
</svg>
