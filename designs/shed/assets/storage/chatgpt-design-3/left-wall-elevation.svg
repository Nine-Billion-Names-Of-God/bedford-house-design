<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="2200" viewBox="0 0 2200 2200">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="6" refY="6" orient="auto-start-reverse">
      <path d="M 0 6 L 12 0 L 9 6 L 12 12 z" fill="#6d7a83"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>
  <style>
    text { font-family: Helvetica, Arial, sans-serif; fill: #22313a; }
    .title { font-size: 34px; font-weight: 700; }
    .subtitle { font-size: 20px; fill: #61727b; }
    .label { font-size: 22px; font-weight: 700; }
    .small { font-size: 18px; fill: #61727b; }
    .dim { font-size: 18px; font-weight: 700; fill: #61727b; }
  </style>
  <rect x="0" y="0" width="2200" height="1600" fill="#f4efe4"/>
  <g transform="translate(120 80) scale(0.74)">
  <text x="90" y="86" class="title">Left Wall Elevation · ChatGPT Design 3</text>
  <text x="90" y="126" class="subtitle">175 cm wall run · rear 120 cm used as the only 60 cm deep dock · front 55 cm kept shallow and open</text>

  <rect x="90" y="164" width="780" height="116" rx="18" fill="#fff9ef" stroke="#d0c2aa" stroke-width="2" filter="url(#shadow)"/>
  <text x="122" y="210" class="label">Wall rule being respected</text>
  <text x="122" y="246" class="small">Tall / deep storage stops short of the front window end. The final 55 cm of wall only carries clips and shallow hanging storage.</text>

  <rect x="280" y="380" width="875" height="880" fill="#fffaf2" stroke="#233139" stroke-width="5" filter="url(#shadow)"/>
  <rect x="280" y="380" width="600" height="880" fill="#f2e2d5" stroke="#8b5435" stroke-width="3"/>
  <line x1="880" y1="380" x2="880" y2="1260" stroke="#8b5435" stroke-width="3"/>

  <line x1="308" y1="1200" x2="852" y2="1200" stroke="#6c7d86" stroke-width="6"/>
  <text x="210" y="1206" class="dim">12 cm</text>
  <line x1="308" y1="800" x2="852" y2="800" stroke="#6c7d86" stroke-width="6"/>
  <text x="210" y="806" class="dim">92 cm</text>
  <line x1="308" y1="534" x2="730" y2="534" stroke="#6c7d86" stroke-width="6"/>
  <text x="210" y="540" class="dim">145 cm</text>

  <rect x="340" y="1008" width="420" height="118" rx="18" fill="#dcc7a6" stroke="#8b7158" stroke-width="2" filter="url(#shadow)"/>
  <text x="370" y="1056" class="label">Tiles low on deck</text>
  <text x="370" y="1088" class="small">60 x 120 cm stack stored flat</text>

  <rect x="330" y="730" width="500" height="58" rx="14" fill="#f7efe3" stroke="#cba782" stroke-width="2"/>
  <text x="580" y="765" class="small" text-anchor="middle">92 cm dock top used as staging shelf</text>
  <rect x="344" y="484" width="346" height="40" rx="12" fill="#f7efe3" stroke="#cba782" stroke-width="2"/>
  <text x="518" y="510" class="small" text-anchor="middle">rear-only upper shelf for light low-use items</text>

  <line x1="970" y1="520" x2="970" y2="1140" stroke="#8ba9bc" stroke-width="8"/>
  <text x="996" y="560" class="small">long-handle garden tools</text>
  <line x1="1080" y1="556" x2="980" y2="742" stroke="#d96355" stroke-width="10"/>
  <text x="974" y="520" class="small">folded ladder</text>
  <text x="930" y="880" class="small">front 55 cm strip stays shallow</text>

  <line x1="280" y1="1326" x2="1155" y2="1326" stroke="#60707a" stroke-width="3" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <line x1="280" y1="1308" x2="280" y2="1344" stroke="#c8b99f" stroke-width="2"/>
  <line x1="1155" y1="1308" x2="1155" y2="1344" stroke="#c8b99f" stroke-width="2"/>
  <text x="718" y="1318" class="dim" text-anchor="middle">175 cm wall length</text>

  <line x1="280" y1="1380" x2="880" y2="1380" stroke="#60707a" stroke-width="3" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <line x1="280" y1="1362" x2="280" y2="1398" stroke="#c8b99f" stroke-width="2"/>
  <line x1="880" y1="1362" x2="880" y2="1398" stroke="#c8b99f" stroke-width="2"/>
  <text x="580" y="1372" class="dim" text-anchor="middle">120 cm deep-dock run</text>

  <line x1="880" y1="1434" x2="1155" y2="1434" stroke="#60707a" stroke-width="3" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <line x1="880" y1="1416" x2="880" y2="1452" stroke="#c8b99f" stroke-width="2"/>
  <line x1="1155" y1="1416" x2="1155" y2="1452" stroke="#c8b99f" stroke-width="2"/>
  <text x="1018" y="1426" class="dim" text-anchor="middle">55 cm front open strip</text>

  <line x1="1188" y1="380" x2="1188" y2="1260" stroke="#60707a" stroke-width="3" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <line x1="1170" y1="380" x2="1206" y2="380" stroke="#c8b99f" stroke-width="2"/>
  <line x1="1170" y1="1260" x2="1206" y2="1260" stroke="#c8b99f" stroke-width="2"/>
  <text x="1202" y="834" class="dim">190 cm height</text>

  <rect x="1320" y="420" width="700" height="286" rx="18" fill="#fff9ef" stroke="#d0c2aa" stroke-width="2" filter="url(#shadow)"/>
  <text x="1350" y="468" class="label">What belongs here</text>
  <text x="1350" y="510" class="small">Tiles, dense awkward items, and the foldable ladder.</text>
  <text x="1350" y="552" class="small">This is the quiet side of the shed, so it is the right place for heavy low-priority storage.</text>
  <text x="1350" y="594" class="small">Only the front edge stays light so the window end is not visually blocked.</text>
  </g>
</svg>
