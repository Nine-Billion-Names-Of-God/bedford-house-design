  <rect x="190" y="1264" width="432" height="88" rx="14" fill="#edf6ef" stroke="#7b8f7d" stroke-width="2"/>
  <text x="406" y="1318" class="label" text-anchor="middle">quiet heavy-storage side</text>

  <rect x="782" y="166" width="634" height="1320" rx="18" fill="#fff9ef" stroke="#d0c2aa" stroke-width="2" filter="url(#shadow)"/>
  <text x="814" y="214" class="label">Looking toward the front wall</text>
  <rect x="846" y="298" width="504" height="920" fill="#fffaf2" stroke="#233139" stroke-width="4"/>
  <rect x="1024" y="432" width="148" height="650" fill="#f3efe4" stroke="#c6b395" stroke-width="4"/>
  <rect x="876" y="470" width="110" height="278" fill="#d9edf3" stroke="#233139" stroke-width="3"/>
  <rect x="1190" y="470" width="110" height="278" fill="#d9edf3" stroke="#233139" stroke-width="3"/>
