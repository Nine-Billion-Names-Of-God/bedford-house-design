  <text x="188" y="804" class="label">Left rear tile dock</text>
  <text x="188" y="838" class="small">120 x 60 cm</text>
  <rect x="184" y="1028" width="288" height="96" rx="12" fill="#dcc7a6" stroke="#8b7158" stroke-width="2"/>
