  <text x="90" y="126" class="subtitle">Three schematic checks from the middle of the shed: left wall, front wall, and right workbench wall.</text>

  <rect x="90" y="166" width="634" height="1320" rx="18" fill="#fff9ef" stroke="#d0c2aa" stroke-width="2" filter="url(#shadow)"/>
  <text x="122" y="214" class="label">Looking left</text>
  <rect x="154" y="298" width="504" height="920" fill="#fffaf2" stroke="#233139" stroke-width="4"/>
