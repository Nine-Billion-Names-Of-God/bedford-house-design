  <path d="M 1172 738 A 180 180 0 0 1 1100 914" fill="none" stroke="#c6b395" stroke-width="3" stroke-dasharray="10 8"/>
  <rect x="934" y="1142" width="332" height="98" rx="14" fill="#edf6ef" stroke="#7b8f7d" stroke-width="2"/>
