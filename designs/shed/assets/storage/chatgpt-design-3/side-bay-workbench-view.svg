  <circle cx="1932" cy="1114" r="90" fill="#eef2ea" stroke="#6a7f68" stroke-width="3"/>
  <text x="1932" y="1120" class="label" text-anchor="middle">BBQ</text>
  <line x1="1888" y1="944" x2="2024" y2="944" stroke="#d96355" stroke-width="8"/>
  <text x="1956" y="916" class="small" text-anchor="middle">cutter rail above BBQ pocket</text>
  <rect x="1582" y="1264" width="420" height="88" rx="14" fill="#edf6ef" stroke="#7b8f7d" stroke-width="2"/>
