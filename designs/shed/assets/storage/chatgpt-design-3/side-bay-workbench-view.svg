  <rect x="184" y="620" width="250" height="42" rx="10" fill="#f7efe3" stroke="#cba782" stroke-width="2"/>
  <text x="309" y="646" class="tiny" text-anchor="middle">rear upper shelf for light items</text>
  <line x1="542" y1="448" x2="542" y2="1110" stroke="#8ba9bc" stroke-width="8"/>
